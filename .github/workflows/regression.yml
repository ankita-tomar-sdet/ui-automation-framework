name: Java Selenium Regression Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Optional: Runs every night at midnight

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    environment: QA

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests with Maven
        env:
          valid_user: ${{ vars.VALID_USER }}
          valid_password: ${{ vars.VALID_PASSWORD }}
        run: mvn clean test
        continue-on-error: true

      - name: Generate Allure Report
        run: mvn allure:report

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: "**/target/allure-results"
          retention-days: 5